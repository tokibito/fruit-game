# Android ガワアプリ（WebView ラッパー）のデバッグ APK を自動ビルドする
name: Build Android APK

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      # Gradle 既定の app-debug.apk を分かりやすい名前にリネームする。
      # バージョンは APK 内部に埋め込まれており、名前に含めると Release の固定 URL が
      # 変わってしまうため、ファイル名はバージョン非依存（fruit-game-debug.apk）に保つ。
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk fruit-game-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fruit-game-debug-apk
          path: fruit-game-debug.apk
          if-no-files-found: error

      # main への push のみ、スマホから直接インストールできるよう GitHub Release に APK を公開する。
      # tag "debug-latest" を毎回上書きするので、ダウンロード URL は常に固定:
      #   https://github.com/tokibito/fruit-game/releases/download/debug-latest/fruit-game-debug.apk
      - name: Publish debug APK to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "最新デバッグ APK"
          prerelease: true
          body: |
            main の最新コミットから自動ビルドしたデバッグ APK です。

            ## スマホへのインストール
            このページを Android スマホのブラウザで開き、下の **fruit-game-debug.apk** をタップしてダウンロード → インストールしてください。
            （初回は「提供元不明のアプリ」のインストール許可が必要な場合があります）

            - Commit: ${{ github.sha }}
          files: fruit-game-debug.apk
