# XcodeGen プロジェクト定義。
# `xcodegen generate` で FruitGame.xcodeproj を生成する（.pbxproj は手書きしない）。
name: FruitGame
options:
  bundleIdPrefix: io.github.tokibito
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"        # 利用者に見えるバージョン表記（CFBundleShortVersionString）
    CURRENT_PROJECT_VERSION: "1"    # ビルド番号（CFBundleVersion）。App Store 更新ごとに増やす
    DEVELOPMENT_TEAM: ""            # 署名する場合に Apple Developer の Team ID を設定

targets:
  FruitGame:
    type: application
    platform: iOS
    sources:
      - path: FruitGame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.tokibito.fruitgame
        PRODUCT_NAME: Fruit Game
        INFOPLIST_FILE: FruitGame/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone と iPad の両対応
        SWIFT_VERSION: "5.0"
        # 署名なしでも CI（シミュレータビルド）が通るようにする。
        # 実機・配布ビルド時は RELEASE.md の手順で署名設定を行う。
        CODE_SIGN_STYLE: Automatic
