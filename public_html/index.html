<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#87CEEB">
    <title>Fruit Game</title>
    <link rel="icon" type="image/png" href="images/apple.png">
    <link rel="apple-touch-icon" href="images/apple.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, #7dd3fc, #bae6fd);
            width: 100vw;
            height: 100vh;
        }
        #game-area {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .fruit {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .fruit:active {
            transform: scale(0.9);
        }
        .fruit img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .special-fruit {
            animation: sparkle 1s infinite;
            filter: drop-shadow(0 0 10px gold);
        }
        @keyframes sparkle {
            0%, 100% {
                filter: drop-shadow(0 0 10px gold) brightness(1.2);
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 20px gold) brightness(1.5);
                transform: scale(1.1);
            }
        }
        .sparkle {
            position: absolute;
            pointer-events: none;
            width: 18px;
            height: 18px;
            margin-left: -9px;
            margin-top: -9px;
            background: radial-gradient(circle, #fff 0%, #fff6b0 35%, rgba(255, 215, 0, 0) 70%);
            border-radius: 50%;
            z-index: 5;
            will-change: transform, opacity;
            animation: sparkle-fade 2s ease-out forwards;
        }
        .sparkle::before,
        .sparkle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 3px;
            transform: translate(-50%, -50%);
            background: linear-gradient(to right, rgba(255, 255, 255, 0), #fff, rgba(255, 255, 255, 0));
            border-radius: 2px;
        }
        .sparkle::after {
            transform: translate(-50%, -50%) rotate(90deg);
        }
        @keyframes sparkle-fade {
            0% {
                opacity: 0;
                transform: scale(0.2) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: scale(1) rotate(20deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.4) rotate(90deg);
            }
        }
        /* チャージが最大（2倍サイズ）に達したキラキラを強調する */
        .sparkle.sparkle-charged {
            filter: drop-shadow(0 0 8px gold) drop-shadow(0 0 16px gold);
        }
        .pop-effect {
            position: absolute;
            font-size: 48px;
            pointer-events: none;
            animation: pop 0.5s ease-out forwards;
        }
        @keyframes pop {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2);
            }
        }
        #score-display {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0.25rem 0.5rem;
            font-size: 1.125rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #2563eb;
            z-index: 10;
        }
        #reset-button {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.375rem;
            padding: 0.5rem;
            width: 2.5rem;
            height: 2.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            opacity: 0.5;
            z-index: 10;
        }
        #reset-button:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        #reset-button:active {
            transform: scale(0.95);
        }
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            width: 100vw;
            height: 100vh;
        }
        #game-logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }
        #game-title {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        #start-button {
            background: #0ea5e9;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 2.25rem;
            padding: 2.5rem 5rem;
            border-radius: 9999px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        #start-button:hover {
            background: #0284c7;
            transform: scale(1.05);
        }
        #start-button:active {
            transform: scale(0.95);
        }
        #version-info {
            position: fixed;
            top: 0.75rem;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0.35;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .hidden {
            display: none !important;
        }
        #flash-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 0.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- リセットボタン -->
    <button id="reset-button" class="hidden">
        🔄
    </button>

    <!-- スコア表示 -->
    <div id="score-display" class="hidden">
        SCORE <span id="score">0</span>
    </div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <div id="version-info"></div>
        <img id="game-logo" src="images/apple.png" alt="Fruit Game Logo">
        <h1 id="game-title">Fruit Game</h1>
        <button id="start-button">
            START
        </button>
    </div>

    <!-- ゲームエリア -->
    <div id="game-area" class="hidden"></div>

    <script>
        let score = 0;
        let gameActive = false;
        let spawnInterval;
        let fruitCount = 0;
        let totalSpawnedFruits = 0; // 総出現数をカウント
        const MAX_FRUITS = 10;
        const STORAGE_KEY = 'fruit-game-state';

        // ゲーム状態を保存（戻るボタン等で再読み込みされても復元できるようにする）
        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    started: gameActive,
                    score: score,
                    totalSpawnedFruits: totalSpawnedFruits
                }));
            } catch (e) { /* ストレージが使えなくても続行 */ }
        }

        // ゲーム状態をクリア
        function clearState() {
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        }

        const startButton = document.getElementById('start-button');
        const startScreen = document.getElementById('start-screen');
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const scoreDisplayContainer = document.getElementById('score-display');
        const resetButton = document.getElementById('reset-button');

        // 効果音
        // effect_15_dogyun: 通常フルーツを消したとき
        // effect_37_kirarin: ボーナスフルーツを消したとき
        const SOUND_NORMAL = 'sounds/effect_15_dogyun.mp3';
        const SOUND_BONUS = 'sounds/effect_37_kirarin.mp3';

        // 連続で消しても重なって鳴るように、再生のたびに複製して再生する
        function playSound(src) {
            try {
                const audio = new Audio(src);
                audio.play().catch(() => { /* 自動再生がブロックされても続行 */ });
            } catch (e) { /* 音が鳴らせなくても続行 */ }
        }

        // BGM（プレイ中にループ再生）
        const BGM_SRC = 'sounds/bgm.mp3';
        let bgmAudio = null;

        function startBgm() {
            try {
                if (!bgmAudio) {
                    bgmAudio = new Audio(BGM_SRC);
                    bgmAudio.loop = true;
                    bgmAudio.volume = 0.35;
                }
                bgmAudio.play().catch(() => { /* 自動再生がブロックされても続行 */ });
            } catch (e) { /* BGMが鳴らせなくても続行 */ }
        }

        function stopBgm() {
            try {
                if (bgmAudio) {
                    bgmAudio.pause();
                    bgmAudio.currentTime = 0;
                }
            } catch (e) { /* 続行 */ }
        }

        // フルーツ画像のリスト
        const fruitImages = [
            'images/apple.png',
            'images/banana.png',
            'images/grape.png',
            'images/kiwi.png',
            'images/orange.png',
            'images/melon.png',
            'images/pineapple.png'
        ];

        // スタート画面にバージョン情報をうっすら表示
        async function displayVersionInfo() {
            const versionInfo = document.getElementById('version-info');
            try {
                const response = await fetch('./version.json', { cache: 'no-store' });
                if (!response.ok) {
                    return;
                }
                const versionData = await response.json();
                versionInfo.textContent = 'ver. ' + versionData.version;
            } catch (error) {
                console.warn('Failed to display version info:', error);
            }
        }
        displayVersionInfo();

        // ページ読み込み時にService Workerを登録してバージョンチェック
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('Service Worker registered:', registration);
                    // バージョンチェックを実行
                    checkVersionUpdate();
                })
                .catch(error => {
                    console.warn('Service Worker registration failed:', error);
                });
        }

        // バージョンチェック関数
        async function checkVersionUpdate() {
            try {
                // IndexedDBからバージョンを取得
                const db = await openIndexedDB();
                const currentVersion = await getVersionFromDB(db);

                // サーバーから最新バージョンを取得
                const response = await fetch('./version.json');
                if (!response.ok) {
                    console.log('Version file not found, skipping version check');
                    return;
                }

                const versionData = await response.json();
                const newVersion = versionData.version;

                console.log('Current version:', currentVersion);
                console.log('New version:', newVersion);

                if (currentVersion && currentVersion !== newVersion) {
                    console.log('Version changed, reloading app...');
                    // フラッシュメッセージを表示
                    const flashMessage = document.createElement('div');
                    flashMessage.id = 'flash-message';
                    flashMessage.textContent = '新しいバージョンに更新しています...';
                    document.body.appendChild(flashMessage);

                    // バージョンを更新
                    await saveVersionToDB(db, newVersion);

                    // すべてのキャッシュを削除
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    console.log('All caches cleared');

                    // IndexedDBのリソースキャッシュも削除
                    await clearResourceCache(db);

                    // Service Workerをアンレジスターして再登録
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                    console.log('Service Worker unregistered');

                    // 1秒後にリロード（強制リロード）
                    setTimeout(() => {
                        window.location.reload(true);
                    }, 1000);
                } else if (!currentVersion) {
                    // 初回起動時
                    await saveVersionToDB(db, newVersion);
                    console.log('Initial version saved:', newVersion);
                }
            } catch (error) {
                console.error('Version check failed:', error);
            }
        }

        // IndexedDBを開く
        function openIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('fruit-game-db', 2);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('resources')) {
                        db.createObjectStore('resources', { keyPath: 'url' });
                    }
                    if (!db.objectStoreNames.contains('version')) {
                        db.createObjectStore('version', { keyPath: 'key' });
                    }
                };
            });
        }

        // IndexedDBからバージョンを取得
        function getVersionFromDB(db) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('version', 'readonly');
                const store = tx.objectStore('version');
                const request = store.get('current');

                request.onsuccess = () => {
                    resolve(request.result?.version || null);
                };
                request.onerror = () => reject(request.error);
            });
        }

        // IndexedDBにバージョンを保存
        function saveVersionToDB(db, version) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('version', 'readwrite');
                const store = tx.objectStore('version');

                store.put({
                    key: 'current',
                    version: version,
                    timestamp: Date.now()
                });

                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // IndexedDBのリソースキャッシュをクリア
        function clearResourceCache(db) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('resources', 'readwrite');
                const store = tx.objectStore('resources');

                store.clear();

                tx.oncomplete = () => {
                    console.log('IndexedDB resource cache cleared');
                    resolve();
                };
                tx.onerror = () => reject(tx.error);
            });
        }

        // スタートボタンのクリック
        startButton.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            gameArea.classList.remove('hidden');
            scoreDisplayContainer.classList.remove('hidden');
            resetButton.classList.remove('hidden');
            gameActive = true;
            saveState();
            startBgm();
            startGame();
        });

        // リセットボタンの長押し
        let resetTimer = null;
        let isResetting = false;

        function startResetTimer() {
            if (isResetting) return;
            isResetting = true;
            resetButton.style.transform = 'scale(0.9)';
            resetButton.style.opacity = '1';

            resetTimer = setTimeout(() => {
                resetGame();
                isResetting = false;
                resetButton.style.transform = '';
                resetButton.style.opacity = '';
            }, 2000);
        }

        function cancelResetTimer() {
            if (resetTimer) {
                clearTimeout(resetTimer);
                resetTimer = null;
            }
            isResetting = false;
            resetButton.style.transform = '';
            resetButton.style.opacity = '';
        }

        resetButton.addEventListener('mousedown', startResetTimer);
        resetButton.addEventListener('mouseup', cancelResetTimer);
        resetButton.addEventListener('mouseleave', cancelResetTimer);
        resetButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startResetTimer();
        });
        resetButton.addEventListener('touchend', cancelResetTimer);
        resetButton.addEventListener('touchcancel', cancelResetTimer);

        // ゲームをリセット
        function resetGame() {
            // ゲームを停止
            gameActive = false;
            if (spawnInterval) {
                clearInterval(spawnInterval);
            }

            // BGMを停止
            stopBgm();

            // すべてのフルーツとエフェクトを削除
            gameArea.innerHTML = '';

            // UIをリセット
            startScreen.classList.remove('hidden');
            gameArea.classList.add('hidden');
            scoreDisplayContainer.classList.add('hidden');
            resetButton.classList.add('hidden');

            // スコアとフルーツカウントをリセット
            score = 0;
            fruitCount = 0;
            totalSpawnedFruits = 0;
            updateScore();

            // 保存していたゲーム状態をクリア
            clearState();

            // バージョンチェックを実行
            checkVersionUpdate();
        }

        // フルーツの生成ループを開始（スコアはリセットしない）
        function startSpawning() {
            spawnFruit();
            // 1〜2秒ごとにフルーツを生成
            spawnInterval = setInterval(() => {
                if (gameActive) {
                    spawnFruit();
                }
            }, 1000 + Math.random() * 1000);
        }

        // ゲーム開始（新規）
        function startGame() {
            score = 0;
            totalSpawnedFruits = 0;
            updateScore();
            startSpawning();
        }

        // スコア更新
        function updateScore() {
            scoreDisplay.textContent = score;
            saveState();
        }

        // フルーツを1個ゲットする（スコア加算・効果音・エフェクト・削除）
        // silent=true のときは効果音を鳴らさない（一括ゲット時にまとめて鳴らすため）
        function popFruit(fruit, silent) {
            if (!fruit || !fruit.parentElement) return;

            // スコア加算（特別なフルーツは10点）
            const isSpecial = fruit.hasAttribute('data-special');
            score += isSpecial ? 10 : 1;
            updateScore();

            // 効果音再生（ボーナスフルーツはキラリン、通常はドギュン）
            if (!silent) {
                playSound(isSpecial ? SOUND_BONUS : SOUND_NORMAL);
            }

            // エフェクト表示
            const effect = document.createElement('div');
            effect.className = 'pop-effect';
            effect.textContent = isSpecial ? '⭐' : '💥';
            if (isSpecial) {
                effect.style.fontSize = '72px';
                effect.style.color = 'gold';
                effect.style.textShadow = '0 0 20px gold';
            }
            effect.style.left = fruit.style.left;
            effect.style.top = fruit.style.top;
            gameArea.appendChild(effect);

            // エフェクトを削除、フルーツを削除してカウント減少
            setTimeout(() => effect.remove(), 500);
            fruit.remove();
            fruitCount--;
        }

        // 画面に表示されているフルーツをすべてゲットする
        // （キラキラを最大までチャージした状態でリリースしたときに発動）
        function collectAllFruits() {
            const fruits = gameArea.querySelectorAll('.fruit');
            if (!fruits.length) return;
            fruits.forEach((fruit) => popFruit(fruit, true));
            // 一括ゲットは豪華に1回だけ効果音を鳴らす
            playSound(SOUND_BONUS);
        }

        // フルーツを生成
        function spawnFruit() {
            // 最大数に達している場合、最も古いフルーツを削除
            if (fruitCount >= MAX_FRUITS) {
                const oldestFruit = gameArea.querySelector('.fruit[data-fruit-id]');
                if (oldestFruit) {
                    oldestFruit.remove();
                    fruitCount--;
                }
            }

            totalSpawnedFruits++;
            saveState();
            const isSpecial = totalSpawnedFruits % 50 === 0; // 50個目ごとに特別なフルーツ

            const fruit = document.createElement('div');
            fruit.className = isSpecial ? 'fruit special-fruit' : 'fruit';
            fruit.setAttribute('data-fruit-id', Date.now());
            if (isSpecial) {
                fruit.setAttribute('data-special', 'true');
            }

            // ランダムなフルーツ画像
            const randomFruit = fruitImages[Math.floor(Math.random() * fruitImages.length)];
            fruit.innerHTML = `<img src="${randomFruit}" alt="fruit">`;

            // 画面外のランダムな開始位置
            const startSide = Math.floor(Math.random() * 4); // 0:上, 1:右, 2:下, 3:左
            let startX, startY;

            switch(startSide) {
                case 0: // 上
                    startX = Math.random() * window.innerWidth;
                    startY = -100;
                    break;
                case 1: // 右
                    startX = window.innerWidth + 100;
                    startY = Math.random() * window.innerHeight;
                    break;
                case 2: // 下
                    startX = Math.random() * window.innerWidth;
                    startY = window.innerHeight + 100;
                    break;
                case 3: // 左
                    startX = -100;
                    startY = Math.random() * window.innerHeight;
                    break;
            }

            // ランダムな目標位置（画面内）
            const targetX = Math.random() * (window.innerWidth - 100);
            const targetY = Math.random() * (window.innerHeight - 100);

            fruit.style.left = startX + 'px';
            fruit.style.top = startY + 'px';

            gameArea.appendChild(fruit);
            fruitCount++;

            // フルーツの移動アニメーション
            const duration = 3000 + Math.random() * 2000; // 3〜5秒
            const startTime = Date.now();
            let animationId = null;
            let isDragging = false;

            function moveFruit() {
                if (isDragging) return; // ドラッグ中はアニメーションしない

                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const currentX = startX + (targetX - startX) * progress;
                const currentY = startY + (targetY - startY) * progress;

                fruit.style.left = currentX + 'px';
                fruit.style.top = currentY + 'px';

                // 目標地点に到達するまでアニメーション継続
                if (progress < 1 && fruit.parentElement) {
                    animationId = requestAnimationFrame(moveFruit);
                }
                // 目標地点に到達したら停止（削除しない）
            }

            moveFruit();

            // ドラッグ機能の実装（マルチタッチ対応）
            let offsetX, offsetY;
            let dragStarted = false;
            let activeTouchId = null; // このフルーツを掴んでいるタッチのID

            function startDrag(e) {
                // タッチイベントの場合
                if (e.type.includes('touch')) {
                    // 既に他のタッチで掴まれている場合は無視
                    if (activeTouchId !== null) return;

                    const rect = fruit.getBoundingClientRect();

                    // このフルーツの領域に触れているタッチを探す
                    let targetTouch = null;
                    for (let i = 0; i < e.touches.length; i++) {
                        const touch = e.touches[i];
                        // タッチ位置がこのフルーツの範囲内かチェック
                        if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                            targetTouch = touch;
                            break;
                        }
                    }

                    // このフルーツに触れているタッチが見つからない場合は何もしない
                    if (!targetTouch) return;

                    activeTouchId = targetTouch.identifier;
                    offsetX = targetTouch.clientX - rect.left;
                    offsetY = targetTouch.clientY - rect.top;
                } else {
                    // マウスイベントの場合
                    offsetX = e.clientX - fruit.getBoundingClientRect().left;
                    offsetY = e.clientY - fruit.getBoundingClientRect().top;
                }

                isDragging = true;
                dragStarted = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }

                // ドラッグ中はアニメーションを一時停止
                fruit.style.animation = 'none';
                fruit.style.transform = 'scale(1.2)';
                fruit.style.zIndex = '1000';

                e.preventDefault();
            }

            function drag(e) {
                if (!isDragging) return;

                if (e.type.includes('touch')) {
                    // マルチタッチ対応: このフルーツを掴んでいるタッチだけを処理
                    let currentTouch = null;
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === activeTouchId) {
                            currentTouch = e.touches[i];
                            break;
                        }
                    }

                    // このフルーツのタッチが見つからない場合は何もしない
                    if (!currentTouch) return;

                    dragStarted = true;
                    const newX = currentTouch.clientX - offsetX;
                    const newY = currentTouch.clientY - offsetY;
                    fruit.style.left = newX + 'px';
                    fruit.style.top = newY + 'px';
                } else {
                    // マウスイベントの場合
                    dragStarted = true;
                    const newX = e.clientX - offsetX;
                    const newY = e.clientY - offsetY;
                    fruit.style.left = newX + 'px';
                    fruit.style.top = newY + 'px';
                }

                e.preventDefault();
            }

            function endDrag(e) {
                if (!isDragging) return;

                // タッチイベントの場合、このフルーツのタッチが終了したか確認
                if (e.type.includes('touch')) {
                    let thisTouchEnded = false;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === activeTouchId) {
                            thisTouchEnded = true;
                            break;
                        }
                    }

                    // このフルーツのタッチじゃない場合は何もしない
                    if (!thisTouchEnded) return;

                    activeTouchId = null; // タッチIDをリセット
                }

                isDragging = false;
                fruit.style.animation = ''; // アニメーションを再開
                fruit.style.transform = '';
                fruit.style.zIndex = '';

                // ドラッグせずにタップだけの場合は消す
                if (!dragStarted) {
                    popFruit(fruit);
                }

                e.preventDefault();
            }

            // タッチイベント（マルチタッチ対応）
            fruit.addEventListener('touchstart', startDrag, { passive: false });
            fruit.addEventListener('touchmove', drag, { passive: false });
            fruit.addEventListener('touchend', endDrag, { passive: false });
            fruit.addEventListener('touchcancel', endDrag, { passive: false });

            // マウスイベント（PCでのテスト用）
            fruit.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', function mouseMoveHandler(e) {
                if (isDragging) drag(e);
            });
            document.addEventListener('mouseup', function mouseUpHandler(e) {
                if (isDragging) {
                    endDrag(e);
                }
            });
        }

        // キラキラ軌跡エフェクト
        // フルーツ以外の場所を触ったときに、指（カーソル）の位置にキラキラを表示する。
        // タッチしたまま動かすと軌跡のようにキラキラが追加され、2秒かけて消えていく。
        // 何もないところを触っても画面に動きが出るようにするための演出。
        //
        // チャージ機能:
        // 触れ続けている間、新しく出るキラキラのサイズが少しずつ大きくなり、
        // 3秒で最大（2倍）に到達する。最大までチャージした状態で指を離すと、
        // 画面に表示されているフルーツをすべてゲットできる。
        const SPARKLE_COLORS = ['#fff6b0', '#bae6fd', '#fbcfe8', '#d9f99d', '#fff'];
        // 軌跡として追加する最小移動距離（短すぎる移動で大量に生成しないため）
        const SPARKLE_MIN_DISTANCE = 14;
        // 最大サイズに到達するまでの時間（ミリ秒）
        const SPARKLE_CHARGE_DURATION = 3000;
        // チャージ最大時のサイズ倍率
        const SPARKLE_MAX_SCALE = 2;
        // 静止していてもチャージ中はキラキラを出し続ける間隔（ミリ秒）
        const SPARKLE_EMIT_INTERVAL = 110;
        // チャージ中のタッチ/カーソルごとの状態（タッチID・mouse をキーにする）
        // { startTime, x, y, lastEmitX, lastEmitY, timer }
        const sparkleTouches = {};

        // 指定座標がフルーツ上かどうかを判定（フルーツ上では軌跡を出さない）
        function isOnFruit(x, y) {
            const el = document.elementFromPoint(x, y);
            return !!(el && el.closest && el.closest('.fruit'));
        }

        // チャージ進行度（0〜1）。3秒で1になる。
        function sparkleChargeRatio(key) {
            const st = sparkleTouches[key];
            if (!st) return 0;
            return Math.min((Date.now() - st.startTime) / SPARKLE_CHARGE_DURATION, 1);
        }

        // 現在のキラキラのサイズ倍率（1〜2倍）
        function sparkleScale(key) {
            return 1 + sparkleChargeRatio(key) * (SPARKLE_MAX_SCALE - 1);
        }

        // 1粒のキラキラを生成（scale はサイズ倍率）
        function createSparkle(x, y, scale) {
            scale = scale || 1;
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            // チャージ最大時は強調表示して、離すと全部ゲットできる合図にする
            if (scale >= SPARKLE_MAX_SCALE - 0.001) {
                sparkle.classList.add('sparkle-charged');
            }
            // 少しランダムにずらして自然な散らばりにする
            const jitterX = (Math.random() - 0.5) * 16;
            const jitterY = (Math.random() - 0.5) * 16;
            sparkle.style.left = (x + jitterX) + 'px';
            sparkle.style.top = (y + jitterY) + 'px';
            // サイズと色をランダムに（チャージ倍率を掛ける）
            const size = (12 + Math.random() * 14) * scale;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.marginLeft = (-size / 2) + 'px';
            sparkle.style.marginTop = (-size / 2) + 'px';
            const color = SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)];
            sparkle.style.background =
                'radial-gradient(circle, #fff 0%, ' + color + ' 35%, rgba(255, 215, 0, 0) 70%)';
            gameArea.appendChild(sparkle);
            // 2秒後（アニメーション終了後）に削除
            setTimeout(() => sparkle.remove(), 2000);
        }

        // タッチ/カーソル開始時にキラキラを表示し、チャージを開始する
        function spawnSparkleAt(x, y, key) {
            if (isOnFruit(x, y)) return;
            const st = {
                startTime: Date.now(),
                x: x, y: y,            // 現在位置（静止中の発生に使う）
                lastEmitX: x, lastEmitY: y,
                timer: null
            };
            sparkleTouches[key] = st;
            createSparkle(x, y, sparkleScale(key));
            // 静止していてもチャージの進み具合が見えるよう、定期的にキラキラを出す
            st.timer = setInterval(() => {
                const s = sparkleTouches[key];
                if (!s || isOnFruit(s.x, s.y)) return;
                createSparkle(s.x, s.y, sparkleScale(key));
            }, SPARKLE_EMIT_INTERVAL);
        }

        // 移動時、一定距離ごとにキラキラを追加して軌跡をつくる
        function trailSparkleAt(x, y, key) {
            const st = sparkleTouches[key];
            if (!st) return; // フルーツ上で開始した等、チャージ中でない場合は何もしない
            st.x = x;
            st.y = y;
            const dx = x - st.lastEmitX;
            const dy = y - st.lastEmitY;
            if (dx * dx + dy * dy < SPARKLE_MIN_DISTANCE * SPARKLE_MIN_DISTANCE) return;
            if (isOnFruit(x, y)) return;
            createSparkle(x, y, sparkleScale(key));
            st.lastEmitX = x;
            st.lastEmitY = y;
        }

        // 指を離したときの処理。チャージが最大なら画面のフルーツを全部ゲットする。
        // collect=false（タッチキャンセル等）のときはゲットせずにチャージだけ終了する。
        function endSparkleAt(key, collect) {
            const st = sparkleTouches[key];
            if (!st) return;
            if (st.timer) clearInterval(st.timer);
            delete sparkleTouches[key];
            const charged = (Date.now() - st.startTime) >= SPARKLE_CHARGE_DURATION;
            if (collect && charged) {
                collectAllFruits();
            }
        }

        // タッチ操作（マルチタッチ対応）
        gameArea.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                spawnSparkleAt(t.clientX, t.clientY, 'touch-' + t.identifier);
            }
        }, { passive: true });
        gameArea.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                trailSparkleAt(t.clientX, t.clientY, 'touch-' + t.identifier);
            }
        }, { passive: true });
        function endTouchSparkles(e, collect) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                endSparkleAt('touch-' + e.changedTouches[i].identifier, collect);
            }
        }
        // 指を離したとき（touchend）はゲット判定する。キャンセルは判定しない。
        gameArea.addEventListener('touchend', (e) => endTouchSparkles(e, true), { passive: true });
        gameArea.addEventListener('touchcancel', (e) => endTouchSparkles(e, false), { passive: true });

        // マウス操作（PCでのテスト用）
        let mouseSparkleDown = false;
        gameArea.addEventListener('mousedown', (e) => {
            mouseSparkleDown = true;
            spawnSparkleAt(e.clientX, e.clientY, 'mouse');
        });
        gameArea.addEventListener('mousemove', (e) => {
            if (!mouseSparkleDown) return;
            trailSparkleAt(e.clientX, e.clientY, 'mouse');
        });
        document.addEventListener('mouseup', () => {
            mouseSparkleDown = false;
            endSparkleAt('mouse', true);
        });

        // 読み込み時に保存済みの状態を復元する。
        // 戻るボタン等でページが再読み込み（またはPWAが再起動）されても、
        // スコアと進行を維持してゲーム画面から続行できるようにする。
        (function restoreState() {
            let saved = null;
            try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}
            if (saved && saved.started) {
                score = saved.score || 0;
                totalSpawnedFruits = saved.totalSpawnedFruits || 0;
                startScreen.classList.add('hidden');
                gameArea.classList.remove('hidden');
                scoreDisplayContainer.classList.remove('hidden');
                resetButton.classList.remove('hidden');
                gameActive = true;
                updateScore();
                startBgm(); // BGMを再開
                // 自動再生がブロックされた場合に備え、最初の操作でBGMを開始する
                const resumeBgmOnce = () => {
                    if (gameActive) startBgm();
                    document.removeEventListener('pointerdown', resumeBgmOnce);
                    document.removeEventListener('touchstart', resumeBgmOnce);
                };
                document.addEventListener('pointerdown', resumeBgmOnce);
                document.addEventListener('touchstart', resumeBgmOnce);
                startSpawning(); // スコアを消さずにフルーツ生成を再開
            }
        })();
    </script>
</body>
</html>
